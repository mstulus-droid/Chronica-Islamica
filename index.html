<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronica Islamica</title>
<link rel="icon" href="assets/chronica-islamica-icon.svg" type="image/svg+xml">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#2c2418">
<meta name="description" content="Linimasa sejarah Islam dengan pendekatan historis-sekuler.">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --bg2: #ede7d9;
    --white: #ffffff;
    --text: #2c2418;
    --text2: #6b5e4a;
    --text3: #9c8e7a;
    --border: #d8cfc2;
    --tick: #b8aa96;
    --c-nabi:     #c87d00;
    --c-khalifah: #c43a0a;
    --c-sahabat:  #1068b0;
    --c-wanita:   #a83070;
    --c-panglima: #6a2a80;
    --c-ulama:    #1a7840;
    --c-event:    #4a6572;
    --label-w: 200px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BAR */
  .topbar {
    background: #fff;
    border-bottom: 2px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.07);
    z-index: 30;
  }
  .topbar h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    flex: 1;
  }
  .app-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(44,36,24,0.16);
  }
  .topbar h1 small {
    font-family: 'Nunito', sans-serif;
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--text3);
    margin-left: 8px;
  }
  .search-wrap { position: relative; }
  .search-wrap input {
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px 5px 28px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    width: 155px;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: #999; }
  .search-icon {
    position: absolute; left: 8px; top: 50%;
    transform: translateY(-50%); font-size: 0.7rem; pointer-events: none;
  }
  .search-suggestions {
    position: absolute;
    top: calc(100% + 7px);
    right: 0;
    width: min(330px, calc(100vw - 24px));
    max-height: 310px;
    overflow-y: auto;
    background: #fffaf2;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 14px 32px rgba(44,36,24,0.18);
    z-index: 80;
    display: none;
    padding: 5px;
  }
  .search-suggestions.show { display: block; }
  .suggestion-item {
    width: 100%;
    border: 0;
    background: transparent;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    text-align: left;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 3px 10px;
    align-items: center;
  }
  .suggestion-item:hover, .suggestion-item:focus {
    background: rgba(255, 226, 92, 0.34);
    outline: none;
  }
  .suggestion-name {
    font-size: 0.78rem;
    font-weight: 800;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .suggestion-meta {
    font-size: 0.64rem;
    font-weight: 800;
    color: var(--text3);
    white-space: nowrap;
  }
  .suggestion-cat {
    font-size: 0.62rem;
    font-weight: 800;
    color: var(--text2);
    grid-column: 1 / -1;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .count-badge { font-size: 0.72rem; color: var(--text3); font-weight: 700; white-space: nowrap; }

  /* FILTER ROW */
  .filter-row {
    background: #faf7f2;
    border-bottom: 1px solid var(--border);
    padding: 5px 10px 5px calc(var(--label-w) + 10px);
    display: flex;
    gap: 5px;
    flex-shrink: 0;
    overflow-x: auto;
    align-items: center;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .row-sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    margin: 0 4px;
    flex-shrink: 0;
  }
  .chip {
    padding: 3px 11px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    color: var(--text2);
    background: #fff;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 4px;
    user-select: none;
  }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; }
  .chip.active, .chip:hover { color: #fff; border-color: transparent; }
  .chip[data-cat="all"].active   { background: var(--text2); border-color: var(--text2); }
  .chip[data-cat="all"]:not(.active):hover { background: var(--text2); }
  .chip[data-cat="nabi"].active      { background: var(--c-nabi); }
  .chip[data-cat="khalifah"].active  { background: var(--c-khalifah); }
  .chip[data-cat="sahabat"].active   { background: var(--c-sahabat); }
  .chip[data-cat="wanita"].active    { background: var(--c-wanita); }
  .chip[data-cat="panglima"].active  { background: var(--c-panglima); }
  .chip[data-cat="ulama"].active     { background: var(--c-ulama); }
  .chip[data-cat="event"].active     { background: var(--c-event); }
  .chip[data-cat="nabi"]:not(.active):hover      { background: var(--c-nabi); }
  .chip[data-cat="khalifah"]:not(.active):hover  { background: var(--c-khalifah); }
  .chip[data-cat="sahabat"]:not(.active):hover   { background: var(--c-sahabat); }
  .chip[data-cat="wanita"]:not(.active):hover    { background: var(--c-wanita); }
  .chip[data-cat="panglima"]:not(.active):hover  { background: var(--c-panglima); }
  .chip[data-cat="ulama"]:not(.active):hover     { background: var(--c-ulama); }
  .chip[data-cat="event"]:not(.active):hover     { background: var(--c-event); }
  .chip.view-chip.active { background: #2d6cdf; border-color: #2d6cdf; color: #fff; }
  .chip.view-chip:not(.active):hover { background: #2d6cdf; border-color: #2d6cdf; color: #fff; }

  /* MAIN */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* NAMES COLUMN */
  .names-col {
    width: var(--label-w);
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 10;
    overflow: hidden;
  }
  .names-header {
    height: 76px; /* ruler 56 + era-strip 20 */
    background: var(--bg2);
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: flex-end;
    padding: 0 10px 10px;
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    flex-shrink: 0;
  }
  .names-scroll {
    flex: 1;
    overflow-y: hidden;
  }
  .name-cell {
    height: 32px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    padding: 0 10px 0 10px;
    gap: 6px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .name-cell:hover { background: rgba(0,0,0,0.05); }
  .name-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .name-text {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    line-height: 1;
  }

  /* CHART SCROLL */
  .chart-scroll {
    flex: 1;
    overflow: auto;
    position: relative;
  }
  .chart-scroll::-webkit-scrollbar { height: 7px; width: 5px; }
  .chart-scroll::-webkit-scrollbar-track { background: var(--bg2); }
  .chart-scroll::-webkit-scrollbar-thumb { background: var(--tick); border-radius: 3px; }

  .chart-inner {
    position: relative;
    min-height: 100%;
  }

  /* RULER */
  .ruler {
    height: 56px;
    position: sticky;
    top: 0;
    background: #fff;
    border-bottom: 1px solid var(--border);
    z-index: 8;
  }
  .tick {
    position: absolute;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateX(-50%);
  }
  .tick-label {
    font-size: 0.65rem;
    font-weight: 800;
    color: var(--text2);
    margin-bottom: 3px;
    white-space: nowrap;
  }
  .tick-line { width: 1px; background: var(--tick); }
  .tick.major .tick-line { height: 12px; }
  .tick.mid .tick-label { font-size: 0.58rem; color: var(--tick); font-weight: 600; }
  .tick.mid .tick-line { height: 7px; }
  .tick.minor .tick-line { height: 4px; background: #ddd; }

  /* ERA STRIP */
  .era-strip {
    height: 20px;
    position: sticky;
    top: 56px;
    z-index: 7;
    background: #faf7f2;
    border-bottom: 2px solid var(--border);
    overflow: hidden;
  }
  .era-block {
    position: absolute;
    top: 0; bottom: 0;
    display: flex;
    align-items: center;
    padding: 0 7px;
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    border-right: 1px solid rgba(0,0,0,0.1);
  }

  /* BARS */
  .bars-layer {
    position: absolute;
    left: 0; right: 0;
    top: 76px; /* ruler + era strip */
  }
  .bar-row {
    height: 32px;
    margin-bottom: 4px;
    position: relative;
  }
  .bar {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding: 0 7px;
    font-size: 0.68rem;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: filter 0.12s, transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .bar-label {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.72rem;
    font-weight: 800;
    color: #1f2a35;
    white-space: nowrap;
    pointer-events: none;
    text-shadow: 0 1px 0 rgba(255,255,255,0.65);
  }
  .bar:hover {
    filter: brightness(1.1);
    transform: translateY(-50%) scaleY(1.12);
    box-shadow: 0 3px 10px rgba(0,0,0,0.28);
    z-index: 10;
  }
  .bar.search-hit {
    filter: brightness(1.18) saturate(1.18);
    outline: 2px solid rgba(255, 245, 160, 0.95);
    outline-offset: 2px;
    box-shadow: 0 0 0 3px rgba(255, 210, 70, 0.35), 0 0 22px rgba(255, 200, 40, 0.9), 0 4px 16px rgba(0,0,0,0.28);
    z-index: 18;
  }
  .bar.search-focus {
    animation: searchPulse 1.25s ease-in-out infinite, searchGlint 1.8s linear infinite;
  }
  .bar.bar-nabi {
    height: 30px;
    box-shadow: 0 0 14px rgba(200,125,0,0.65), 0 0 4px rgba(255,215,100,0.4);
    border: 2px solid rgba(255,215,100,0.55);
    z-index: 6;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
  }
  .bar.bar-nabi:hover {
    box-shadow: 0 0 22px rgba(200,125,0,0.9), 0 0 6px rgba(255,215,100,0.6);
    filter: brightness(1.2);
    z-index: 15;
  }
  .event-marker {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    color: #4a6572;
    text-shadow: 0 0 5px rgba(74,101,114,0.7);
    transition: text-shadow 0.15s, transform 0.1s;
    z-index: 5;
  }
  .event-marker:hover {
    text-shadow: 0 0 10px rgba(74,101,114,1), 0 0 4px rgba(100,180,255,0.6);
    transform: translate(-50%, -50%) scale(1.3);
    z-index: 15;
  }
  .event-marker.search-hit {
    color: #ffc928;
    text-shadow: 0 0 4px #fff8b2, 0 0 12px rgba(255,201,40,0.95), 0 0 28px rgba(255,160,0,0.8);
    transform: translate(-50%, -50%) scale(1.45);
    z-index: 18;
  }
  .event-marker.search-focus {
    animation: eventSearchPulse 1.15s ease-in-out infinite;
  }
  .bar-label.search-hit {
    color: #2c2418;
    background: rgba(255, 238, 120, 0.9);
    border-radius: 4px;
    padding: 1px 5px;
    box-shadow: 0 0 12px rgba(255, 201, 40, 0.8);
    z-index: 18;
  }
  .age-tooltip {
    position: absolute;
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.6rem;
    font-weight: 800;
    pointer-events: none;
    z-index: 25;
    display: none;
  }
  .reign-icon {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 10px;
    line-height: 1;
    z-index: 5;
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
  }
  .work-icon {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 10px;
    line-height: 1;
    z-index: 5;
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
    cursor: help;
  }
  .name-cell.search-hit {
    background: rgba(255, 226, 92, 0.34);
    box-shadow: inset 3px 0 0 #ffc928;
  }
  .name-cell.search-focus {
    animation: nameSearchPulse 1.25s ease-in-out infinite;
  }
  @keyframes searchPulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(255, 210, 70, 0.32), 0 0 18px rgba(255, 200, 40, 0.75), 0 4px 16px rgba(0,0,0,0.28); }
    50% { box-shadow: 0 0 0 5px rgba(255, 245, 160, 0.55), 0 0 34px rgba(255, 207, 48, 1), 0 6px 20px rgba(0,0,0,0.32); }
  }
  @keyframes searchGlint {
    0% { outline-color: rgba(255, 245, 160, 0.75); }
    50% { outline-color: rgba(255, 255, 255, 1); }
    100% { outline-color: rgba(255, 245, 160, 0.75); }
  }
  @keyframes eventSearchPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1.35); }
    50% { transform: translate(-50%, -50%) scale(1.7); }
  }
  @keyframes nameSearchPulse {
    0%, 100% { background: rgba(255, 226, 92, 0.32); }
    50% { background: rgba(255, 245, 160, 0.64); }
  }

  /* GRID */
  .grid-layer {
    position: absolute;
    left: 0; top: 76px; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }
  .grid-vline {
    position: absolute; top: 0; bottom: 0;
    width: 1px; background: #e0d8cc;
  }
  .grid-vline.major { background: var(--tick); }
  .era-band-bg {
    position: absolute; top: 0; bottom: 0;
  }

  /* POPUP */
  .popup {
    display: none;
    position: fixed;
    z-index: 500;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    max-width: 310px;
    min-width: 230px;
    overflow: hidden;
    animation: popIn 0.16s ease;
  }
  .popup.show { display: block; }
  @keyframes popIn {
    from { opacity:0; transform: scale(0.94) translateY(5px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  .popup-hd {
    padding: 11px 14px 9px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .popup-cat { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
  .popup-name { font-size: 0.97rem; font-weight: 800; color: var(--text); line-height: 1.2; }
  .popup-yr { font-size: 0.72rem; color: var(--text3); font-weight: 600; margin-top: 2px; }
  .popup-close {
    position: absolute; top: 8px; right: 10px;
    background: none; border: none;
    font-size: 1rem; color: var(--text3); cursor: pointer;
  }
  .popup-close:hover { color: var(--text); }
  .popup-bd { padding: 9px 14px 13px; }
  .popup-loc { font-size: 0.7rem; color: var(--text3); font-weight: 600; margin-bottom: 7px; }
  .popup-bio { font-size: 0.8rem; color: var(--text2); line-height: 1.55; }
  .cursor-line {
    position: absolute;
    width: 1.5px;
    background: rgba(200, 60, 20, 0.45);
    pointer-events: none;
    z-index: 20;
    display: none;
  }
  .cursor-info {
    position: absolute;
    background: rgba(44, 36, 24, 0.88);
    color: #fff;
    padding: 3px 10px;
    border-radius: 5px;
    font-size: 0.7rem;
    font-weight: 800;
    white-space: nowrap;
    pointer-events: none;
    z-index: 21;
    display: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  /* POPUP HANDLE (mobile) */
  .popup-handle {
    display: none;
    width: 38px; height: 4px;
    background: #ccc;
    border-radius: 2px;
    margin: 10px auto 2px;
  }

  @keyframes slideUp {
    from { transform: translateY(55%); opacity: 0.4; }
    to   { transform: translateY(0);   opacity: 1; }
  }

  /* MOBILE */
  @media (max-width: 640px) {
    .topbar { padding: 6px 10px; gap: 8px; }
    .topbar h1 { font-size: 0.88rem; }
    .topbar h1 small { display: none; }
    .search-wrap input { width: 110px; font-size: 0.75rem; }
    .search-suggestions { right: -36px; width: min(300px, calc(100vw - 16px)); }
    .count-badge { display: none; }

    .filter-row { padding-left: 10px; }
    .names-col  { display: none !important; }

    .popup-handle { display: block; }
    .popup.show {
      left: 0 !important;
      right: 0 !important;
      top: auto !important;
      bottom: 0 !important;
      max-width: 100vw;
      min-width: 100vw;
      border-radius: 14px 14px 0 0;
      border-left: none;
      border-right: none;
      border-bottom: none;
      max-height: 60vh;
      overflow-y: auto;
      animation: slideUp 0.22s ease;
    }

    .bar { height: 18px; }
    .bar.bar-nabi { height: 24px; }
    .event-marker { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <img class="app-icon" src="assets/chronica-islamica-icon.svg" alt="" aria-hidden="true">
  <h1>Chronica Islamica <small>Linimasa Sejarah Islam</small></h1>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Cari tokoh…">
    <div class="search-suggestions" id="searchSuggestions"></div>
  </div>
  <span class="count-badge" id="countBadge"></span>
</div>

<div class="filter-row">
  <div class="chip active" data-cat="all">Semua</div>
  <div class="chip" data-cat="nabi"><span class="dot" style="background:var(--c-nabi)"></span>Nabi</div>
  <div class="chip" data-cat="khalifah"><span class="dot" style="background:var(--c-khalifah)"></span>Penguasa</div>
  <div class="chip" data-cat="sahabat"><span class="dot" style="background:var(--c-sahabat)"></span>Sahabat</div>
  <div class="chip" data-cat="wanita"><span class="dot" style="background:var(--c-wanita)"></span>Wanita</div>
  <div class="chip" data-cat="panglima"><span class="dot" style="background:var(--c-panglima)"></span>Panglima</div>
  <div class="chip" data-cat="ulama"><span class="dot" style="background:var(--c-ulama)"></span>Ilmuwan/Ulama</div>
  <div class="chip" data-cat="event"><span class="dot" style="background:var(--c-event)"></span>Event</div>
  <div class="row-sep"></div>
  <div class="chip view-chip active" id="panelToggle" style="margin-left:auto">Panel Nama: ON</div>
</div>

<div class="main">
  <div class="names-col">
    <div class="names-header">Nama Tokoh</div>
    <div class="names-scroll" id="namesScroll">
      <div id="namesList"></div>
    </div>
  </div>
  <div class="chart-scroll" id="chartScroll">
    <div class="chart-inner" id="chartInner">
      <div class="ruler" id="ruler"></div>
      <div class="era-strip" id="eraStrip"></div>
      <div class="grid-layer" id="gridLayer"></div>
      <div class="bars-layer" id="barsLayer"></div>
    </div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-handle"></div>
  <div class="popup-hd">
    <button class="popup-close" id="popupClose">✕</button>
    <div class="popup-cat" id="pCat"></div>
    <div class="popup-name" id="pName"></div>
    <div class="popup-yr" id="pYr"></div>
  </div>

  {name:"Ibnu Taimiyah",born:1263,died:"1328 M",city:"Harran",country:"Turki",cat:"ulama",bio:"Teolog Hanbali yang kontroversial. Dipenjara berkali-kali karena fatwa-fatwanya yang menentang penguasa. Pandangannya tentang bid'ah dan jihad berpengaruh besar pada gerakan reformasi Islam modern."},
  {name:"Ibn Khaldun",born:1332,died:"1406 M",city:"Tunis",country:"Tunisia",cat:"ulama",works:[{year:1377,title:"Al-Muqaddimah"}],bio:"Sejarawan dan sosiolog. 'Al-Muqaddimah'-nya dianggap sebagai karya pertama filsafat sejarah dan sosiologi ilmiah. Memperkenalkan konsep 'asabiyah (solidaritas sosial) sebagai penggerak kebangkitan dan kejatuhan peradaban."},
  {name:"Amr bin al-As",born:573,died:"664 M",city:"Mekkah",country:"Arab Saudi",cat:"panglima",bio:"Panglima militer awal Islam. Memimpin penaklukan Mesir (639–642 M) dan mendirikan Fustat. Dikenal licik dan pragmatis dalam strategi diplomasi serta militer. Sempat memihak Muawiyah dalam Perang Shiffin."},
  {name:"Al-Khansa",born:575,died:"645 M",city:"Najd",country:"Arab Saudi",cat:"wanita",bio:"Penyair Arab pra-Islam dan awal Islam yang paling terkenal. Dikenal atas elegi untuk saudara-saudaranya yang tewas dalam pertempuran. Bertemu Muhammad dan diklaim sebagai penyair terhebat. Memeluk Islam setelah penaklukan Makkah."},
  {name:"Usamah bin Zaid",born:625,died:"680 M",city:"Madinah",country:"Arab Saudi",cat:"panglima",bio:"Putra Zaid bin Haritsah dan Umm Ayman. Tradisi awal menyebut Muhammad menunjuknya memimpin ekspedisi ke Syam pada 632 M, keputusan yang diperdebatkan sebagian elite karena usianya masih muda."},
  {name:"Yazid I bin Muawiyah",born:647,died:"683 M",city:"Damaskus",country:"Suriah",cat:"khalifah",reignStart:680,bio:"Khalifah Umayyah kedua (680–683 M). Suksesinya menandai perubahan dari pemilihan elite menjadi monarki dinasti. Pemerintahannya dibayangi Karbala (680 M), pemberontakan Hijaz, dan citra negatif dalam banyak sumber pro-Alid."},
  {name:"Al-Saffah",born:721,died:"754 M",city:"Humeimah",country:"Yordania",cat:"khalifah",reignStart:750,bio:"Khalifah Abbasiyah pertama (750–754 M). Memimpin pemberontakan yang menjatuhkan Dinasti Umayyah. Membunuh hampir seluruh anggota keluarga Umayyah yang ditangkap. Memindahkan ibu kota ke Kufah."},
  {name:"Al-Jahiz",born:776,died:"869 M",city:"Basrah",country:"Irak",cat:"ulama",works:[{year:868,title:"Kitab al-Hayawan"}],bio:"Sastrawan, teolog Mu'tazilah, dan pengamat budaya Abbasiyah. 'Kitab al-Hayawan' memadukan zoologi, anekdot, sastra, dan refleksi sosial. Tradisi biografis populer menyebut ia meninggal setelah tertimpa tumpukan buku, meski detailnya tidak pasti."},
  {name:"Al-Mu'tasim",born:796,died:"842 M",city:"Samarra",country:"Irak",cat:"khalifah",reignStart:833,bio:"Khalifah Abbasiyah kedelapan (833–842 M). Memindahkan ibu kota ke Samarra. Dikenal atas kebijakan militeris dan penggunaan pasukan Turk sebagai elite militer. Menaklukkan Amorium (838 M) dari Byzantium."},
  {name:"Al-Mutawakkil",born:822,died:"861 M",city:"Samarra",country:"Irak",cat:"khalifah",reignStart:847,bio:"Khalifah Abbasiyah (847–861 M). Membalikkan kebijakan Mu'tazilah dan mendukung Sunni ortodoks. Memerintahkan pembunuhan saudaranya. Dibunuh oleh pengawal Turk dalam kudeta istana."},
  {name:"Al-Ash'ari",born:873,died:"936 M",city:"Basrah",country:"Irak",cat:"ulama",bio:"Teolog dan pendiri mazhab akidah Asy'ariyah. Awalnya penganut Mu'tazilah lalu beralih. Menyusun sintesis rasionalisme Yunani dengan teks keagamaan Islam. Mazhabnya dominan dalam teologi Sunni hingga kini."},
  {name:"Abd al-Rahman III",born:891,died:"961 M",city:"Cordoba",country:"Spanyol",cat:"khalifah",reignStart:929,bio:"Caliph Cordoba (929–961 M), puncak kejayaan Al-Andalus. Memproklamirkan diri sebagai caliph untuk menyaingi Abbasiyah Baghdad dan Fatimiyah Kairo. Membangun Madinat al-Zahra. Memerintah wilayah terluas di Spanyol Islam."},
  {name:"Ibn Hazm",born:994,died:"1064 M",city:"Cordoba",country:"Spanyol",cat:"ulama",works:[{year:1027,title:"Al-Fisal fi al-Milal"}],bio:"Ulama Andalusia, filsuf, dan sejarawan. Penyusun 'Al-Fisal fi al-Milal' yang menganalisis perbandingan agama. Mazhabnya Zahiri — menolak analogi dan hanya mengakui teks literal. Sempat dipenjara dan diasingkan karena politik."},
  {name:"Nuruddin al-Zanki",born:1118,died:"1174 M",city:"Aleppo",country:"Suriah",cat:"panglima",bio:"Penguasa Zankid dan pendahulu Salahudin. Membangun kekuasaan Muslim di Syam melalui perang, patronase madrasah, dan propaganda jihad anti-Salib. Reformasi institusionalnya membantu konsolidasi politik Suriah dan Mesir."},
  {name:"Fakhr al-Din al-Razi",born:1149,died:"1209 M",city:"Rayy",country:"Iran",cat:"ulama",works:[{year:1210,title:"Mafatih al-Ghaib"}],bio:"Teolog, filsuf, dan polimate Persia. Menulis tafsir Al-Qur'an terbesar dalam tradisi Sunni ('Mafatih al-Ghaib'). Dikenal atas kritik tajam terhadap filsafat Ibn Sina. Dikuburkan di Herat, Afghanistan."},
  {name:"Ibn Arabi",born:1165,died:"1240 M",city:"Murcia",country:"Spanyol",cat:"ulama",works:[{year:1230,title:"Fusus al-Hikam"},{year:1238,title:"Al-Futuhat al-Makkiyah"}],bio:"Sufi, filsuf, dan penulis produktif dari Al-Andalus. Dijuluki 'Syekh Akbar'. Karyanya 'Al-Futuhat al-Makkiyah' dan 'Fusus al-Hikam' sangat berpengaruh dalam tasawuf. Pandangannya tentang wahdat al-wujud kontroversial di kalangan ulama ortodoks."},
  {name:"Al-Musta'sim Billah",born:1213,died:"1258 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:1242,bio:"Khalifah Abbasiyah terakhir di Baghdad (1242–1258 M). Dikatakan tidak memahami ancaman Mongol. Ditangkap oleh Hulagu Khan dan dieksekusi. Menandai berakhirnya kekhalifahan Abbasiyah klasik."},
  {name:"Qutuz",born:1220,died:"1260 M",city:"Kipchak",country:"Kazakhstan",cat:"panglima",bio:"Sultan Mamluk yang memimpin kemenangan Ain Jalut (1260 M) melawan Mongol. Sebelumnya budak Kipchak yang melarikan diri dari pasukan Mongol. Dibunuh oleh Baybars segera setelah kemenangan dalam kudeta istana."},
  {name:"Sulaiman bin Abdul Malik",born:674,died:"717 M",city:"Damaskus",country:"Suriah",cat:"khalifah",reignStart:715,bio:"Khalifah Umayyah (715–717 M). Putra Abdul Malik bin Marwan. Membatalkan ekspansi militer besar-besaran yang direncanakan Al-Walid. Dikenal atas kebijakan pro-pedesaan dan anti-urban."},
  {name:"Hisham bin Abdul Malik",born:691,died:"743 M",city:"Damaskus",country:"Suriah",cat:"khalifah",reignStart:724,bio:"Khalifah Umayyah (724–743 M). Pemerintahan terpanjang dalam sejarah Umayyah. Masa kestabilan administratif dan ekspansi di Asia Tengah. Dikritik karena kebijakan fiskal yang keras."},
  {name:"Marwan II",born:688,died:"750 M",city:"Damaskus",country:"Suriah",cat:"khalifah",reignStart:744,bio:"Khalifah Umayyah terakhir (744–750 M). Berusaha mempersatukan kekhalifahan yang hancur akibat pemberontakan. Kalah dalam Pertempuran Zab (750 M) melawan Abbasiyah. Tewas saat melarikan diri ke Mesir."},
  {name:"Al-Hadi",born:764,died:"786 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:785,bio:"Khalifah Abbasiyah keempat (785–786 M). Putra Al-Mahdi. Pemerintahan sangat singkat. Dikabarkan meninggal karena penyakit, meski ada tuduhan diracun oleh ibunya Al-Khayzuran."},
  {name:"Al-Amin",born:787,died:"813 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:809,bio:"Khalifah Abbasiyah (809–813 M). Putra Harun ar-Rasyid yang ditunjuk sebagai pewaris. Terlibat dalam perang saudara brutal melawan saudaranya Al-Ma'mun. Kalah, ditangkap, dan dieksekusi."},
  {name:"Al-Wathiq",born:812,died:"847 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:842,bio:"Khalifah Abbasiyah (842–847 M). Putra Al-Mu'tasim. Dikenal sebagai pemerhati musik dan sastra. Pemerintahannya relatif damai dibandingkan para pendahulu dan penerusnya."},
  {name:"Al-Muntasir",born:837,died:"862 M",city:"Samarra",country:"Irak",cat:"khalifah",reignStart:861,bio:"Khalifah Abbasiyah (861–862 M). Putra Al-Mutawakkil. Memimpin kudeta yang membunuh ayahnya. Pemerintahan singkat sebelum meninggal dalam keadaan mencurigakan, diduga diracun."},
  {name:"Al-Mu'tamid",born:842,died:"892 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:870,bio:"Khalifah Abbasiyah (870–892 M). Pemerintahan terpanjang setelah era Al-Mutawakkil. Memindahkan ibu kota kembali ke Baghdad dari Samarra. Upaya revitalisasi kekhalifahan yang melemah akibat kudeta berulang."},
  {name:"Al-Mu'tadid",born:857,died:"902 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:892,bio:"Khalifah Abbasiyah (892–902 M). Putra Al-Mu'tamid. Dikenal sebagai reformis militer dan administratif. Berhasil memperluas kembali wilayah Abbasiyah yang menyusut."},
  {name:"Al-Qadir",born:947,died:"1031 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:991,bio:"Khalifah Abbasiyah (991–1031 M). Pemerintahan terpanjang dalam sejarah Abbasiyah (40 tahun). Masa kestabilan politik dan keagamaan. Memperkuat posisi Sunni ortodoks melawan Syiah dan Mu'tazilah."},
  {name:"Al-Nasir",born:1158,died:"1225 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:1180,bio:"Khalifah Abbasiyah (1180–1225 M). Pemerintahan terpanjang kedua dalam sejarah Abbasiyah. Upaya revitalisasi kekhalifahan melalui diplomasi, ekonomi, dan jaringan sufi. Gagal menghadapi ancaman Mongol."},
  {name:"Al-Qa'im",born:1000,died:"1075 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:1031,bio:"Khalifah Abbasiyah (1031–1075 M). Putra Al-Qadir. Pemerintahan panjang 44 tahun ditandai dengan penurunan kekuasaan politik ke tangan Seldjuk. Kekhalifahan menjadi simbol keagamaan tanpa kekuasaan militer efektif."},
  {name:"Al-Muqtadi",born:1056,died:"1094 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:1075,bio:"Khalifah Abbasiyah (1075–1094 M). Pemerintahan ditandai dengan dominasi Seldjuk yang semakin kuat. Masa pemerintahannya berlangsung saat Perang Salib I mulai dipersiapkan di Eropa."},
  {name:"Al-Mustazhir",born:1076,died:"1118 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:1094,bio:"Khalifah Abbasiyah (1094–1118 M). Pemerintahan selama Perang Salib I (1096–1099 M). Kekhalifahan tetap lemah secara politik di bawah bayang-bayang Seldjuk. Fokus pada kegiatan keagamaan dan budaya."},
  {name:"Al-Mustarshid",born:1092,died:"1135 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:1118,bio:"Khalifah Abbasiyah (1118–1135 M). Berupaya memperkuat kekuasaan Abbasiyah dari Seldjuk. Ditangkap dan dibunuh oleh pasukan Seldjuk saat perjalanan diplomatik."},
  {name:"Al-Muqtafi",born:1096,died:"1160 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:1136,bio:"Khalifah Abbasiyah (1136–1160 M). Berhasil membebaskan Baghdad dari ketergantungan pada Seldjuk. Memperluas wilayah dan pendapatan kekhalifahan. Dianggap sebagai pemulihan kekuasaan Abbasiyah sebelum kehancuran."},
  {name:"Al-Mustadi",born:1142,died:"1180 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:1170,bio:"Khalifah Abbasiyah (1170–1180 M). Putra Al-Mustanjid. Pemerintahan stabil dengan hubungan baik dengan Salahudin al-Ayyubi. Meninggal saat kekhalifahan sedang dalam fase pemulihan."},
  {name:"Al-Mahdi Billah",born:873,died:"934 M",city:"Kairouan",country:"Tunisia",cat:"khalifah",reignStart:909,bio:"Pendiri Dinasti Fatimiyah (909–934 M). Mengklaim keturunan Fatimah dan Ali. Membentuk kekhalifahan Syiah Ismailiyah di Afrika Utara. Memindahkan ibu kota ke Al-Mahdiyah."},
  {name:"Al-Mu'izz li-Din Allah",born:932,died:"975 M",city:"Mahdia",country:"Tunisia",cat:"khalifah",reignStart:953,bio:"Khalifah Fatimiyah (953–975 M). Puncak kekuasaan Fatimiyah di Afrika Utara. Memerintahkan penaklukan Mesir (969 M) dan mendirikan Kairo. Dikenal atas patronase ilmu pengetahuan dan perpustakaan."},
  {name:"Zaid bin Haritsah",born:581,died:"629 M",city:"Najd",country:"Arab Saudi",cat:"sahabat",bio:"Mantan budak yang dibebaskan dan diangkat sebagai anak oleh Muhammad sebelum aturan adopsi berubah dalam komunitas Muslim. Ia menjadi salah satu komandan ekspedisi awal dan tewas di Perang Mu'tah (629 M)."},
  {name:"Hafshah binti Umar",born:605,died:"665 M",city:"Makkah",country:"Arab Saudi",cat:"wanita",bio:"Putri Umar bin Khattab dan salah satu istri Muhammad. Tradisi kodifikasi Al-Qur'an menyebut mushaf awal yang dikumpulkan pada masa Abu Bakar disimpan padanya sebelum dipakai dalam standardisasi Utsman."},
  {name:"Umm Waraqah",born:600,died:"640 M",city:"Madinah",country:"Arab Saudi",cat:"wanita",bio:"Perempuan Madinah yang dikenal karena hafalan dan pembacaan Al-Qur'an dalam tradisi awal. Riwayat tentang perannya sering dipakai dalam perdebatan hukum mengenai otoritas perempuan dalam ruang ibadah domestik."},
  {name:"Al-Hajjaj bin Yusuf",born:661,died:"714 M",city:"Taif",country:"Arab Saudi",cat:"panglima",bio:"Gubernur Umayyah yang menguasai Irak dan wilayah timur. Terkenal karena administrasi keras, reformasi fiskal, dan penumpasan pemberontakan Ibn al-Ash'ath. Namanya juga dikaitkan dengan penyeragaman bacaan dan ortografi mushaf."},
  {name:"Abd al-Rahman I",born:731,died:"788 M",city:"Damaskus",country:"Suriah",cat:"khalifah",reignStart:756,bio:"Pangeran Umayyah yang lolos dari revolusi Abbasiyah dan mendirikan Emirat Cordoba (756 M). Pemerintahannya memisahkan Al-Andalus dari kontrol politik Baghdad dan membangun basis dinasti Umayyah baru di Iberia."},
  {name:"Fatima al-Fihri",born:800,died:"880 M",city:"Kairouan",country:"Tunisia",cat:"wanita",bio:"Tokoh perempuan yang dalam tradisi Maroko dikaitkan dengan pendirian Masjid al-Qarawiyyin di Fez (859 M). Narasi biografinya terlambat secara sumber, tetapi namanya penting dalam memori pendidikan Islam Maghreb."},
  {name:"Hunayn ibn Ishaq",born:809,died:"873 M",city:"Al-Hira",country:"Irak",cat:"ulama",works:[{year:850,title:"Terjemahan Galen"}],bio:"Dokter Kristen Arab dan penerjemah utama di Baghdad Abbasiyah. Menerjemahkan karya Galen, Hippokrates, dan filsafat Yunani ke bahasa Arab dan Suryani, menjadikan ilmu kedokteran Yunani tersedia bagi sarjana Muslim."},
  {name:"Al-Kindi",born:801,died:"873 M",city:"Kufah",country:"Irak",cat:"ulama",works:[{year:850,title:"Risalah filsafat dan optik"}],bio:"Filsuf Arab awal di lingkungan Abbasiyah. Mengadaptasi filsafat Yunani, matematika, musik, dan optik ke dalam bahasa intelektual Arab. Karyanya menunjukkan pertemuan patronase istana, penerjemahan, dan spekulasi rasional."},
  {name:"Al-Razi",born:865,died:"925 M",city:"Rayy",country:"Iran",cat:"ulama",works:[{year:925,title:"Al-Hawi"}],bio:"Dokter dan filsuf Persia. Menulis karya klinis besar seperti 'Al-Hawi' dan membedakan cacar dari campak. Pandangan filsafatnya sering dianggap kontroversial oleh teolog Muslim karena lebih rasionalis dan independen."},
  {name:"Sitt al-Mulk",born:970,died:"1023 M",city:"Kairo",country:"Mesir",cat:"wanita",bio:"Putri Fatimiyah dan saudari Al-Hakim bi-Amr Allah. Setelah hilangnya Al-Hakim pada 1021 M, ia menjadi pengatur transisi kekuasaan untuk Al-Zahir dan memainkan peran penting dalam stabilisasi istana Kairo."},
  {name:"Al-Zahrawi",born:936,died:"1013 M",city:"Cordoba",country:"Spanyol",cat:"ulama",works:[{year:1000,title:"Al-Tasrif"}],bio:"Dokter bedah Andalusia. Ensiklopedia medisnya 'Al-Tasrif' memuat instrumen dan prosedur bedah yang kemudian diterjemahkan ke Latin dan dipakai di Eropa. Perannya lebih ilmiah-praktis daripada teologis."},
  {name:"Alp Arslan",born:1029,died:"1072 M",city:"Khurasan",country:"Iran",cat:"panglima",bio:"Sultan Seldjuk yang mengalahkan Byzantium di Manzikert (1071 M). Kemenangan ini mempercepat migrasi Turk ke Anatolia dan mengubah keseimbangan kekuasaan antara Byzantium, dunia Islam, dan bangsa Turk."},
  {name:"Nizam al-Mulk",born:1018,died:"1092 M",city:"Tus",country:"Iran",cat:"ulama",works:[{year:1091,title:"Siyasatnama"}],bio:"Wazir Seldjuk dan arsitek jaringan madrasah Nizamiyah. 'Siyasatnama' menggambarkan teori pemerintahan praktis, birokrasi, dan kontrol politik. Dibunuh oleh kelompok yang sering dikaitkan dengan Nizari Ismaili."},
  {name:"Hulagu Khan",born:1217,died:"1265 M",city:"Mongolia",country:"Mongolia",cat:"panglima",bio:"Panglima Mongol pendiri Ilkhanate. Menghancurkan Baghdad pada 1258 M dan mengakhiri kekhalifahan Abbasiyah di kota itu. Kampanyenya mengubah struktur politik Iran, Irak, dan Syam."},
  {name:"Osman I",born:1258,died:"1324 M",city:"Sogut",country:"Turki",cat:"khalifah",reignStart:1299,bio:"Pemimpin beylik Turk di Anatolia barat yang menjadi cikal bakal Dinasti Utsmaniyah. Pada masanya kekuasaan masih lokal, tetapi ekspansi perbatasan melawan Byzantium memberi dasar bagi negara Ottoman."},
  {name:"Timur",born:1336,died:"1405 M",city:"Kesh",country:"Uzbekistan",cat:"panglima",bio:"Penakluk Turko-Mongol pendiri Dinasti Timurid. Kampanyenya menghancurkan kota-kota besar di Iran, Irak, India utara, dan Syam, tetapi istananya juga menjadi pusat patronase seni dan ilmu di Asia Tengah."},

  /* ── WANITA TAMBAHAN ── */
  {name:"Sumayyah binti Khayyat",born:560,died:"615 M",city:"Makkah",country:"Arab Saudi",cat:"wanita",bio:"Budak wanita yang termasuk pemeluk Islam paling awal. Dicambuk dan disiksa Abu Jahl di padang pasir Makkah karena menolak meninggalkan kepercayaannya. Tewas akibat siksaan — tercatat sebagai orang pertama yang mati karena bergabung dengan gerakan Muhammad. Suaminya Yasir dan anaknya Ammar juga disiksa bersama-sama."},
  {name:"Nusaybah binti Ka'ab",born:595,died:"640 M",city:"Madinah",country:"Arab Saudi",cat:"wanita",bio:"Dikenal dengan nama Ummu Ammara. Salah satu dari sedikit perempuan yang tercatat aktif bertempur dalam sejarah awal Islam. Bertempur di Perang Uhud (625 M) saat banyak pasukan mundur, melindungi Muhammad dengan tubuhnya sendiri. Kehilangan tangan dalam Perang Yamamah (633 M) melawan nabi palsu Musaylimah."},
  {name:"Ummu Salamah",born:596,died:"683 M",city:"Makkah",country:"Arab Saudi",cat:"wanita",bio:"Nama asli Hind binti Abi Umayyah. Janda yang dinikahi Muhammad dan dikenal atas kecerdasannya dalam politik. Saat Perjanjian Hudaybiyah (628 M), ia menyarankan Muhammad untuk memulai ritual terlebih dahulu tanpa menunggu persetujuan pengikut — saran yang terbukti efektif meredakan ketegangan. Menyampaikan banyak hadits dan hidup hingga usia tua."},
  {name:"Rufaidah al-Aslamiyah",born:575,died:"632 M",city:"Madinah",country:"Arab Saudi",cat:"wanita",bio:"Perempuan Madinah yang mengorganisir perawatan medis lapangan dalam kampanye militer Muhammad. Mendirikan tenda kesehatan di dekat masjid untuk merawat korban luka. Melatih perempuan lain dalam perawatan medis darurat. Dianggap sebagai perawat pertama dalam sejarah Islam."},
  {name:"Rabia al-Adawiyah",born:714,died:"801 M",city:"Basrah",country:"Irak",cat:"wanita",bio:"Tokoh asketisme Basrah yang kemudian sangat penting dalam memori tasawuf. Tradisi sufi mengaitkannya dengan gagasan cinta ilahi tanpa motif imbalan atau takut hukuman. Detail biografinya bercampur dengan legenda hagiografis."},
  {name:"Sitt al-Wuzara",born:1200,died:"1285 M",city:"Kairo",country:"Mesir",cat:"wanita",bio:"Ulama perempuan dari Kairo yang mengajar fiqih Syafi'i dan memberikan ijazah kepada murid-murid laki-laki. Aktivitas mengajarnya terdokumentasi dalam catatan biografi ulama abad ke-13. Bukti bahwa perempuan berperan aktif dalam transmisi ilmu agama di era Mamluk."},

  /* ── PANGLIMA TAMBAHAN ── */
  {name:"Uqbah bin Nafi",born:622,died:"683 M",city:"Makkah",country:"Arab Saudi",cat:"panglima",bio:"Komandan ekspansi Arab ke Afrika Utara. Mendirikan kota Kairouan (670 M) di Tunisia — kota Arab tertua di Maghreb dan pusat penyebaran Islam di Afrika Barat. Dibunuh dalam penyergapan oleh pasukan Berber di bawah pemimpin Kusayla di dekat Biskra, Aljazair."},
  {name:"Musa bin Nusair",born:640,died:"716 M",city:"Bani Makhzum",country:"Arab Saudi",cat:"panglima",bio:"Gubernur Afrika Utara yang mengirim Thariq bin Ziyad ke Spanyol (711 M), lalu menyeberang sendiri dengan pasukan lebih besar. Bersama menaklukkan hampir seluruh Semenanjung Iberia. Dipanggil pulang oleh Khalifah Sulayman bin Abdul Malik dan meninggal dalam kemiskinan setelah hartanya disita."},
  {name:"Mehmed II (al-Fatih)",born:1432,died:"1481 M",city:"Edirne",country:"Turki",cat:"panglima",bio:"Sultan Utsmaniyah yang menaklukkan Konstantinopel (1453 M) mengakhiri Kekaisaran Byzantium setelah 1.100 tahun. Menggunakan meriam raksasa karya insinyur Hungaria, Urban, untuk meruntuhkan tembok Theodosian. Bergelar 'al-Fatih' (Sang Penakluk). Membangun Hagia Sophia menjadi masjid, mendukung seni dan arsitektur, dan mengumpulkan manuskrip Yunani."},
  {name:"Dihya al-Kahina",born:640,died:"703 M",city:"Aures",country:"Aljazair",cat:"panglima",bio:"Ratu dan pemimpin militer suku Berber Aures yang memimpin perlawanan sengit terhadap invasi Arab di Afrika Utara. Mengalahkan pasukan Umayyah dalam beberapa pertempuran dan memaksa mereka mundur ke Tripoli selama bertahun-tahun. Akhirnya dikalahkan dan tewas sekitar 703 M. Kisahnya menjadi simbol perlawanan Berber."},

  /* ── ULAMA TAMBAHAN ── */
  {name:"Al-Idrisi",born:1100,died:"1165 M",city:"Ceuta",country:"Maroko",cat:"ulama",works:[{year:1154,title:"Tabula Rogeriana"}],bio:"Ahli geografi dari Ceuta yang bekerja di istana Raja Roger II dari Sisilia, Kristen. Menyusun 'Tabula Rogeriana' (1154 M) — peta dunia paling akurat di Abad Pertengahan. Peta dibuat dengan orientasi selatan di atas, sesuai konvensi kartografi Arab. Menjadi referensi navigasi selama berabad-abad."},
  {name:"Ibn Battuta",born:1304,died:"1368 M",city:"Tangier",country:"Maroko",cat:"ulama",works:[{year:1355,title:"Rihla (Tuhfat al-Nuzzar)"}],bio:"Penjelajah dari Maroko yang menempuh lebih dari 120.000 km selama 29 tahun — paling jauh di antara penjelajah abad pertengahan manapun. Mengunjungi Afrika Utara, Timur Tengah, Afrika Timur, Asia Tengah, India, Asia Tenggara, dan China. Catatan perjalanannya 'Rihla' adalah sumber sejarah tak ternilai tentang dunia abad ke-14."},
  {name:"Ibn Qayyim al-Jauziyah",born:1292,died:"1350 M",city:"Damaskus",country:"Suriah",cat:"ulama",bio:"Ulama Hanbali dan murid terdekat Ibnu Taimiyah. Dipenjara bersama gurunya. Penulis produktif yang membahas teologi, kedokteran jiwa, hukum, dan spiritualitas. Karya 'Zad al-Ma'ad' dan 'Madarij al-Salikin' masih banyak dibaca. Pendekatan psikologi spiritual dalam karyanya dianggap progresif untuk zamannya."},
  {name:"Al-Muqaddasi",born:946,died:"1000 M",city:"Yerusalem",country:"Palestina",cat:"ulama",works:[{year:985,title:"Ahsan al-Taqasim"}],bio:"Ahli geografi yang lahir di Yerusalem. Karyanya 'Ahsan al-Taqasim fi Ma'rifat al-Aqalim' (985 M) adalah deskripsi etnografis dan geografis dunia Islam yang sistematis. Melakukan perjalanan langsung ke hampir semua wilayah yang ia deskripsikan, bukan hanya mengandalkan sumber tertulis."},
  {name:"Ibnu Khaldun al-Andalusi",born:1248,died:"1315 M",city:"Sevilla",country:"Spanyol",cat:"ulama",bio:"Ulama dan filolog dari Andalusia (berbeda dari Ibnu Khaldun Tunisia). Bermigrasi ke Afrika Utara setelah jatuhnya wilayah Islam di Spanyol. Mendokumentasikan bahasa, sastra, dan kosakata Arab-Andalusia yang kemudian hilang — warisan tertulis penting peradaban Al-Andalus."},

  /* ── KHALIFAH TAMBAHAN ── */
  {name:"Yazid bin Abdul Malik",born:688,died:"724 M",city:"Damaskus",country:"Suriah",cat:"khalifah",reignStart:720,bio:"Khalifah Umayyah (720–724 M). Pemerintahannya pendek dan ditandai oleh pemberontakan Yazid bin al-Muhallab. Dikenal menghabiskan waktu di istana bersama penyanyi favorit Hababah dan Sallamah — perilaku yang dikritik keras oleh ulama sezaman."},
  {name:"Al-Muqtadir Billah",born:895,died:"932 M",city:"Baghdad",country:"Irak",cat:"khalifah",reignStart:908,bio:"Khalifah Abbasiyah (908–932 M). Naik tahta di usia 13 tahun — termuda dalam sejarah Abbasiyah. Pemerintahannya dikuasai ibu dan para wazir. Digulingkan dua kali dan akhirnya tewas dalam pertempuran melawan panglimanya sendiri. Masa pemerintahannya menandai awal keruntuhan otoritas khalifah Abbasiyah."},
  {name:"Al-Hakim bi-Amr Allah",born:985,died:"1021 M",city:"Kairo",country:"Mesir",cat:"khalifah",reignStart:996,bio:"Khalifah Fatimiyah (996–1021 M). Memerintahkan penghancuran Gereja Makam Kudus di Yerusalem (1009 M) — salah satu pemicu awal Perang Salib. Menerapkan aturan-aturan aneh termasuk larangan kue tertentu dan pembatasan gerak perempuan. Menghilang secara misterius pada 1021 M; para pengikut Druze menganggapnya masih hidup."},

  {name:"Hijrah ke Madinah",born:622,died:"622 M",city:"Madinah",country:"Arab Saudi",cat:"event",icon:"⚑",bio:"Muhammad dan para pengikutnya berpindah dari Makkah ke Madinah (622 M) atas undangan suku Aus dan Khazraj yang mencari mediator konflik internal. Peristiwa ini menandai titik balik gerakan Muhammad dari kelompok minoritas teraniaya menjadi kekuatan politik. Tahun 622 M kemudian ditetapkan sebagai tahun pertama kalender Hijriah oleh Khalifah Umar."},

  {name:"Wabah Amwas",born:638,died:"639 M",city:"Syam",country:"Suriah",cat:"event",icon:"✝",bio:"Epidemi pes yang menghantam Syam selama kampanye penaklukan Arab (638–639 M). Menewaskan sekitar 25.000 orang termasuk panglima senior Abu Ubaidah bin Jarrah dan Muadz bin Jabal. Umar bin Khattab membatalkan perjalanan ke Suriah setelah mendapat laporan wabah. Peristiwa ini memunculkan diskusi panjang di kalangan ulama tentang boleh-tidaknya memasuki atau melarikan diri dari wilayah wabah."},
  {name:"Penaklukan Afrika Utara",born:670,died:"710 M",city:"Kairouan",country:"Tunisia",cat:"event",icon:"⚑",bio:"Ekspansi Arab ke Maghreb (670–710 M) menghadapi perlawanan sengit dari suku-suku Berber. Uqbah bin Nafi mendirikan Kairouan (670 M). Pemimpin Berber Kusayla lalu Dihya al-Kahina memimpin perlawanan yang memaksa mundur pasukan Arab bertahun-tahun. Ekspansi baru berhasil diselesaikan setelah kedua pemimpin Berber tewas. Ceuta jatuh pada 710 M."},
  {name:"Penaklukan Spanyol",born:711,died:"718 M",city:"Gibraltar",country:"Spanyol",cat:"event",icon:"⚑",bio:"Thariq bin Ziyad menyeberangi Selat Gibraltar dengan ~7.000 pasukan Arab-Berber (711 M) dan mengalahkan Raja Visigoth Roderick di Pertempuran Guadalete. Dalam 7 tahun hampir seluruh Semenanjung Iberia dikuasai, membentuk Al-Andalus. Keberhasilan ini dipermudah konflik internal antara bangsawan Visigoth, beberapa di antaranya mengundang pasukan Arab sebagai sekutu."},
  {name:"Perang Salib II",born:1147,died:"1149 M",city:"Damaskus",country:"Suriah",cat:"event",icon:"⚔",bio:"Dipicu oleh jatuhnya County of Edessa ke Imad al-Din Zanki (1144 M). Dipimpin Raja Louis VII dari Prancis dan Kaisar Conrad III. Pengepungan Damaskus (1148 M) gagal total dalam lima hari. Bencana militer terbesar bagi Tentara Salib sejak Perang Salib I, dan mempererat persatuan penguasa Muslim di Syam."},
  {name:"Reconquista Selesai",born:1492,died:"1492 M",city:"Granada",country:"Spanyol",cat:"event",icon:"⚑",bio:"Jatuhnya Emirat Granada ke tangan Kerajaan Kastilia dan Aragon (2 Januari 1492 M) menandai berakhirnya kehadiran politik Islam di Semenanjung Iberia setelah 781 tahun. Sultan Muhammad XII (Boabdil) menyerahkan kunci kota kepada Ferdinand dan Isabella. Para Muslim dan Yahudi kemudian dipaksa memilih antara konversi ke Katolik atau pengusiran."},

  {name:"Perjanjian Hudaybiyah",born:628,died:"628 M",city:"Hudaybiyah",country:"Arab Saudi",cat:"event",icon:"⚑",bio:"Gencatan senjata antara komunitas Muhammad dan Quraisy Makkah (628 M). Meski terlihat merugikan bagi sebagian pengikut, perjanjian ini memberi ruang ekspansi diplomatik dan membuka jalan menuju penaklukan Makkah dua tahun kemudian."},

  {label:'Dinasti Umayyah', start:661, end:750, color:'rgba(30,100,190,0.09)', textColor:'#1050a0'},
  {label:'Dinasti Abbasiyah', start:750, end:1258, color:'rgba(130,40,180,0.07)', textColor:'#6a20a0'},
  {label:'Era Mamluk & Akhir Pertengahan', start:1258, end:1500, color:'rgba(180,60,40,0.07)', textColor:'#8a3020'},
];

const Y0 = 540, Y1 = 1500;
const PX = 10;
const ROW_H = 32, ROW_GAP = 4;

function xOf(y) { return (y - Y0) * PX; }
function totalW() { return (Y1 - Y0) * PX + 60; }

const ALL_CATS = ['nabi','khalifah','sahabat','wanita','panglima','ulama','event'];
let activeCats = new Set(ALL_CATS), searchQ = '', viewMode = 'compact';
function getFiltered() {
  return ALL_ITEMS.filter(f => {
    return activeCats.has(f.cat);
  });
}
function matchesSearch(f) {
  const q = searchQ.trim().toLowerCase();
  if (!q) return false;
  return f.name.toLowerCase().includes(q);
}
function addSearchClass(el, f, matchCount) {
  if (!matchesSearch(f)) return;
  el.classList.add('search-hit');
  if (matchCount === 1) el.classList.add('search-focus');
}
function scrollToSearchTarget(target) {
  if (!target) return;
  const cs = document.getElementById('chartScroll');
  const viewportW = cs.clientWidth;
  const viewportH = cs.clientHeight;
  cs.scrollTo({
    left: Math.max(0, target.x - viewportW / 2),
    top: Math.max(0, target.y - viewportH / 2),
    behavior: 'smooth'
  });
}
function renderSearchSuggestions(matches) {
  const box = document.getElementById('searchSuggestions');
  if (!box) return;
  box.innerHTML = '';
  if (!searchQ.trim() || matches.length <= 1) {
    box.classList.remove('show');
    return;
  }

  matches.slice(0, 9).forEach(f => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'suggestion-item';
    btn.innerHTML = `
      <span class="suggestion-name">${f.name}</span>
      <span class="suggestion-meta">${f.born}–${parseDied(f.died) || f.born} M</span>
      <span class="suggestion-cat" style="color:${CAT_COLORS[f.cat]}">${CAT_LABEL[f.cat]}</span>
    `;
    btn.addEventListener('mousedown', e => e.preventDefault());
    btn.addEventListener('click', () => {
      const input = document.getElementById('searchInput');
      searchQ = f.name;
      input.value = f.name;
      box.classList.remove('show');
      render();
    });
    box.appendChild(btn);
  });
  box.classList.add('show');
}

function render() {
  const filtered = getFiltered();
  const matched = searchQ.trim() ? filtered.filter(matchesSearch) : [];
  const matchCount = matched.length;
  renderSearchSuggestions(matched);
  document.getElementById('countBadge').textContent = searchQ.trim()
    ? `${matchCount} ditemukan / ${filtered.length} item`
    : filtered.length + ' item';
  const namesCol = document.querySelector('.names-col');
  namesCol.style.display = viewMode === 'compact' ? 'none' : 'flex';

  const W = totalW();

  const ci = document.getElementById('chartInner');
  ci.style.width = W + 'px';

  // --- RULER ---
  const ruler = document.getElementById('ruler');
  ruler.style.width = W + 'px';
  ruler.innerHTML = '';
  for (let y = Y0; y <= Y1; y += 10) {
    const x = xOf(y);
    const is50 = y % 50 === 0;
    const is20 = y % 20 === 0;
    const div = document.createElement('div');
    div.className = 'tick ' + (is50 ? 'major' : is20 ? 'mid' : 'minor');
    div.style.left = x + 'px';
    let inner = '';
    if (is50) inner = `<span class="tick-label">${y} M</span>`;
    else if (is20) inner = `<span class="tick-label">${y}</span>`;
    inner += `<div class="tick-line"></div>`;
    div.innerHTML = inner;
    ruler.appendChild(div);
  }

  // --- ERA STRIP ---
  const es = document.getElementById('eraStrip');
  es.style.width = W + 'px';
  es.innerHTML = '';
  ERAS.forEach(e => {
    const x1 = xOf(e.start), x2 = xOf(e.end);
    const b = document.createElement('div');
    b.className = 'era-block';
    b.style.left = x1 + 'px';
    b.style.width = (x2 - x1) + 'px';
    b.style.background = e.color;
    b.style.color = e.textColor;
    b.textContent = e.label;
    es.appendChild(b);
  });

  // Pre-calculate geometry
  const items = filtered.map(f => {
    const diedY = parseDied(f.died) || (f.born + 35);
    const x1 = xOf(f.born);
    const xEnd = xOf(parseDied(f.died) || f.born);
    const minW = f.cat === 'event' ? 18 : 14;
    const barW = Math.max(xEnd - x1, minW);
    const centerX = f.cat === 'event' ? (x1 + Math.max(xEnd - x1, PX) / 2) : null;
    return { f, x1, x2: x1 + barW, barW, centerX };
  });

  let contentH;
  let lanes = [];

  if (viewMode === 'compact') {
    const sorted = [...items].sort((a, b) => a.x1 - b.x1 || a.x2 - b.x2);
    sorted.forEach(item => {
      let placed = false;
      for (let li = 0; li < lanes.length; li++) {
        const lane = lanes[li];
        const last = lane[lane.length - 1];
        if (item.x1 >= last.x2 + 2) {
          lane.push(item);
          placed = true;
          break;
        }
      }
      if (!placed) {
        lanes.push([item]);
      }
    });
    contentH = lanes.length * (ROW_H + ROW_GAP) + 20;
  } else {
    contentH = filtered.length * (ROW_H + ROW_GAP) + 20;
  }

  ci.style.height = (contentH + 76 + 10) + 'px';

  // --- GRID ---
  const gl = document.getElementById('gridLayer');
  gl.style.width = W + 'px';
  gl.style.height = contentH + 'px';
  gl.innerHTML = '';
  ERAS.forEach(e => {
    const band = document.createElement('div');
    band.className = 'era-band-bg';
    band.style.left = xOf(e.start) + 'px';
    band.style.width = (xOf(e.end) - xOf(e.start)) + 'px';
    band.style.background = e.color;
    gl.appendChild(band);
  });
  for (let y = Y0; y <= Y1; y += 10) {
    const vl = document.createElement('div');
    vl.className = 'grid-vline' + (y % 50 === 0 ? ' major' : '');
    vl.style.left = xOf(y) + 'px';
    gl.appendChild(vl);
  }

  // --- BARS ---
  const bl = document.getElementById('barsLayer');
  bl.innerHTML = '';

  // --- NAMES ---
  const nl = document.getElementById('namesList');
  nl.innerHTML = '';
  let searchTarget = null;

  if (viewMode === 'compact') {
    lanes.forEach((lane, laneIdx) => {
      lane.forEach(item => {
        const { f, x1, barW } = item;
        const color = CAT_COLORS[f.cat];
        const barTop = laneIdx * (ROW_H + ROW_GAP) + ROW_H / 2;

        if (f.cat === 'event') {
          const marker = document.createElement('div');
          marker.className = 'event-marker';
          addSearchClass(marker, f, matchCount);
          marker.textContent = f.icon || '⚔';
          marker.style.left = item.centerX + 'px';
          marker.style.top = barTop + 'px';
          marker.title = f.name;
          marker.addEventListener('click', e => { e.stopPropagation(); showPopup(f, e); });
          bl.appendChild(marker);
          if (matchCount === 1 && matchesSearch(f)) searchTarget = { x: item.centerX, y: 76 + barTop };
        } else {
          const bar = document.createElement('div');
          bar.className = 'bar' + (f.cat === 'nabi' ? ' bar-nabi' : '');
          addSearchClass(bar, f, matchCount);
          bar.style.left = x1 + 'px';
          bar.style.top = barTop + 'px';
          bar.style.width = barW + 'px';
          if (f.cat === 'khalifah' && f.reignStart) {
            const diedYear = parseDied(f.died) || (f.born + 35);
            const preSpan = Math.max(0, f.reignStart - f.born);
            const totalSpan = diedYear - f.born;
            const prePct = (preSpan / totalSpan) * 100;
            bar.style.background = `linear-gradient(90deg, ${color}f0 0%, ${color}b0 ${prePct}%, #ff6d00f0 ${prePct}%, #ffca28b0 100%)`;
          } else {
            bar.style.background = `linear-gradient(90deg, ${color}f0, ${color}b0)`;
          }
          if (barW > 55) bar.textContent = f.name;
          bar.addEventListener('click', e => { e.stopPropagation(); showPopup(f, e); });
          if (f.cat !== 'nabi') {
            bar.addEventListener('mouseenter', () => { ageTooltip.style.display = 'block'; });
            bar.addEventListener('mousemove', (e) => {
              const rect = chartScroll.getBoundingClientRect();
              const mouseX = e.clientX - rect.left + chartScroll.scrollLeft;
              const year = Math.round(mouseX / PX) + Y0;
              const age = Math.max(0, year - f.born);
              ageTooltip.textContent = age;
              ageTooltip.style.left = (mouseX + 8) + 'px';
              ageTooltip.style.top = (e.clientY - rect.top + chartScroll.scrollTop - 18) + 'px';
            });
            bar.addEventListener('mouseleave', () => { ageTooltip.style.display = 'none'; });
          }
          bl.appendChild(bar);
          if (matchCount === 1 && matchesSearch(f)) searchTarget = { x: x1 + barW / 2, y: 76 + barTop };
          if (f.reignStart) {
            const reignIcon = document.createElement('span');
            reignIcon.className = 'reign-icon';
            reignIcon.textContent = '👑';
            reignIcon.style.left = (xOf(f.reignStart) - x1) + 'px';
            bar.appendChild(reignIcon);
          }
          if (f.works) {
            f.works.forEach(w => {
              const workIcon = document.createElement('span');
              workIcon.className = 'work-icon';
              workIcon.textContent = '📚';
              workIcon.title = w.title;
              workIcon.style.left = Math.max(0, Math.min(xOf(w.year) - x1, barW - 6)) + 'px';
              bar.appendChild(workIcon);
            });
          }

          if (barW <= 55) {
            const label = document.createElement('div');
            label.className = 'bar-label';
            addSearchClass(label, f, matchCount);
            label.textContent = f.name;
            label.style.left = (x1 + barW + 6) + 'px';
            label.style.top = barTop + 'px';
            bl.appendChild(label);
          }
        }
      });
    });
  } else {
    items.forEach(item => {
      const { f, x1, barW } = item;
      const color = CAT_COLORS[f.cat];

      const row = document.createElement('div');
      row.className = 'bar-row';
      if (f.cat === 'event') {
        const marker = document.createElement('div');
        marker.className = 'event-marker';
        addSearchClass(marker, f, matchCount);
        marker.textContent = f.icon || '⚔';
        marker.style.left = item.centerX + 'px';
        marker.title = f.name;
        marker.addEventListener('click', e => { e.stopPropagation(); showPopup(f, e); });
        row.appendChild(marker);
        if (matchCount === 1 && matchesSearch(f)) searchTarget = { x: item.centerX, y: 76 + (items.indexOf(item) * (ROW_H + ROW_GAP)) + ROW_H / 2 };
      } else {
        const bar = document.createElement('div');
        bar.className = 'bar' + (f.cat === 'nabi' ? ' bar-nabi' : '');
        addSearchClass(bar, f, matchCount);
        bar.style.left = x1 + 'px';
        bar.style.width = barW + 'px';
        if (f.cat === 'khalifah' && f.reignStart) {
          const diedYear = parseDied(f.died) || (f.born + 35);
          const preSpan = Math.max(0, f.reignStart - f.born);
          const totalSpan = diedYear - f.born;
          const prePct = (preSpan / totalSpan) * 100;
          bar.style.background = `linear-gradient(90deg, ${color}f0 0%, ${color}b0 ${prePct}%, #ff6d00f0 ${prePct}%, #ffca28b0 100%)`;
        } else {
          bar.style.background = `linear-gradient(90deg, ${color}f0, ${color}b0)`;
        }
        if (barW > 55) bar.textContent = f.name;
        bar.addEventListener('click', e => { e.stopPropagation(); showPopup(f, e); });
        if (f.cat !== 'nabi') {
          bar.addEventListener('mouseenter', () => { ageTooltip.style.display = 'block'; });
          bar.addEventListener('mousemove', (e) => {
            const rect = chartScroll.getBoundingClientRect();
            const mouseX = e.clientX - rect.left + chartScroll.scrollLeft;
            const year = Math.round(mouseX / PX) + Y0;
            const age = Math.max(0, year - f.born);
            ageTooltip.textContent = age;
            ageTooltip.style.left = (mouseX + 8) + 'px';
            ageTooltip.style.top = (e.clientY - rect.top + chartScroll.scrollTop - 18) + 'px';
          });
          bar.addEventListener('mouseleave', () => { ageTooltip.style.display = 'none'; });
        }
        row.appendChild(bar);
        if (matchCount === 1 && matchesSearch(f)) searchTarget = { x: x1 + barW / 2, y: 76 + (items.indexOf(item) * (ROW_H + ROW_GAP)) + ROW_H / 2 };
        if (f.reignStart) {
          const reignIcon = document.createElement('span');
          reignIcon.className = 'reign-icon';
          reignIcon.textContent = '👑';
          reignIcon.style.left = (xOf(f.reignStart) - x1) + 'px';
          bar.appendChild(reignIcon);
        }
        if (f.works) {
          f.works.forEach(w => {
            const workIcon = document.createElement('span');
            workIcon.className = 'work-icon';
            workIcon.textContent = '📚';
            workIcon.title = w.title;
            workIcon.style.left = Math.max(0, Math.min(xOf(w.year) - x1, barW - 6)) + 'px';
            bar.appendChild(workIcon);
          });
        }
      }
      bl.appendChild(row);

      const cell = document.createElement('div');
      cell.className = 'name-cell';
      addSearchClass(cell, f, matchCount);
      cell.innerHTML = `<div class="name-dot" style="background:${color}"></div><div class="name-text">${f.name}</div>`;
      cell.addEventListener('click', () => {
        document.getElementById('chartScroll').scrollLeft = Math.max(0, x1 - 60);
      });
      nl.appendChild(cell);
    });
  }

  syncScroll();
  if (matchCount === 1) requestAnimationFrame(() => scrollToSearchTarget(searchTarget));
}

// Sync vertical scroll
function syncScroll() {
  const cs = document.getElementById('chartScroll');
  const ns = document.getElementById('namesScroll');
  let lock = false;
  cs.onscroll = () => { if (lock) return; lock = true; ns.scrollTop = cs.scrollTop; lock = false; };
  ns.onscroll = () => { if (lock) return; lock = true; cs.scrollTop = ns.scrollTop; lock = false; };
}

// Popup
function showPopup(f, e) {
  const p = document.getElementById('popup');
  document.getElementById('pCat').textContent = CAT_LABEL[f.cat];
  document.getElementById('pCat').style.color = CAT_COLORS[f.cat];
  document.getElementById('pName').textContent = f.name;
  document.getElementById('pYr').textContent = `${f.born} M — ${f.died}`;
  document.getElementById('pLoc').textContent = `📍 ${f.city}, ${f.country}`;
  document.getElementById('pBio').textContent = f.bio || '—';
  p.classList.add('show');
  const vw = window.innerWidth, vh = window.innerHeight;
  let px = e.clientX + 14, py = e.clientY + 10;
  if (px + 320 > vw - 8) px = e.clientX - 330;
  if (py + 280 > vh - 8) py = e.clientY - 290;
  if (py < 8) py = 8;
  if (px < 8) px = 8;
  p.style.left = px + 'px';
  p.style.top = py + 'px';
}

document.getElementById('popupClose').onclick = () => document.getElementById('popup').classList.remove('show');
document.addEventListener('click', e => { if (!document.getElementById('popup').contains(e.target)) document.getElementById('popup').classList.remove('show'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('popup').classList.remove('show'); });

function refreshCatChipState() {
  const isAll = activeCats.size === ALL_CATS.length;
  document.querySelectorAll('.chip[data-cat]').forEach(ch => {
    const cat = ch.dataset.cat;
    if (cat === 'all') ch.classList.toggle('active', isAll);
    else ch.classList.toggle('active', activeCats.has(cat));
  });
}

document.querySelectorAll('.chip[data-cat]').forEach(c => {
  c.addEventListener('click', () => {
    const cat = c.dataset.cat;
    if (cat === 'all') {
      activeCats = new Set(ALL_CATS);
    } else {
      if (activeCats.has(cat)) activeCats.delete(cat);
      else activeCats.add(cat);
      if (!activeCats.size) activeCats = new Set(ALL_CATS);
    }
    refreshCatChipState();
    render();
  });
});

document.getElementById('panelToggle').addEventListener('click', () => {
  const btn = document.getElementById('panelToggle');
  viewMode = viewMode === 'panel' ? 'compact' : 'panel';
  btn.classList.toggle('active', viewMode === 'panel');
  btn.textContent = viewMode === 'panel' ? 'Panel Nama: ON' : 'Panel Nama: OFF';
  render();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});
document.getElementById('searchInput').addEventListener('focus', () => {
  renderSearchSuggestions(getFiltered().filter(matchesSearch));
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('searchSuggestions').classList.remove('show');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('searchSuggestions').classList.remove('show');
  }
});

// Cursor tracker
const chartScroll = document.getElementById('chartScroll');
const cursorLine = document.createElement('div');
cursorLine.className = 'cursor-line';
const cursorInfo = document.createElement('div');
cursorInfo.className = 'cursor-info';
const ageTooltip = document.createElement('div');
ageTooltip.className = 'age-tooltip';
chartScroll.appendChild(cursorLine);
chartScroll.appendChild(cursorInfo);
chartScroll.appendChild(ageTooltip);

chartScroll.addEventListener('mousemove', e => {
  const rect = chartScroll.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const scrollLeft = chartScroll.scrollLeft;
  const year = Math.round((x + scrollLeft) / PX) + Y0;

  // Garis selalu menyentuh dari atas sampai bawah viewport (terlihat meski scroll ke bawah)
  cursorLine.style.top = chartScroll.scrollTop + 'px';
  cursorLine.style.height = chartScroll.clientHeight + 'px';
  cursorLine.style.left = (x + scrollLeft) + 'px';
  cursorLine.style.display = 'block';

  // Info label selalu di dekat atas area yang terlihat
  cursorInfo.style.top = (chartScroll.scrollTop + chartScroll.clientHeight - 36) + 'px';

  let infoText = '';
  if (year < 570) {
    infoText = `${570 - year} tahun sebelum MUHAMMAD lahir`;
  } else if (year > 632) {
    infoText = `${year - 632} tahun setelah MUHAMMAD meninggal`;
  } else {
    infoText = `MUHAMMAD usia ${year - 570} tahun`;
  }

  cursorInfo.textContent = `${year} M · ${infoText}`;
  cursorInfo.style.display = 'block';

  const infoW = cursorInfo.offsetWidth;
  if (x + infoW + 16 > rect.width) {
    cursorInfo.style.left = (x - infoW - 10 + scrollLeft) + 'px';
  } else {
    cursorInfo.style.left = (x + 10 + scrollLeft) + 'px';
  }
});

chartScroll.addEventListener('mouseleave', () => {
  cursorLine.style.display = 'none';
  cursorInfo.style.display = 'none';
});

const _toggleBtn = document.getElementById('panelToggle');
_toggleBtn.classList.toggle('active', viewMode === 'panel');
_toggleBtn.textContent = viewMode === 'panel' ? 'Panel Nama: ON' : 'Panel Nama: OFF';

refreshCatChipState();
render();
</script>
</body>
</html>
